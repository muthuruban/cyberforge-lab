<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StaffHub Portal - Login</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f3f5f7;
        margin: 0;
      }
      .container {
        max-width: 420px;
        margin: 80px auto;
        background: #ffffff;
        border: 1px solid #d9dde3;
        border-radius: 10px;
        padding: 24px;
      }
      h1 {
        margin-top: 0;
        color: #153a5b;
      }
      p.note {
        color: #5a6978;
      }
      label {
        display: block;
        font-weight: 600;
        margin-top: 12px;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #b9c4d1;
        border-radius: 6px;
        margin-top: 6px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        border: none;
        background: #1e5b89;
        color: white;
        padding: 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      .error {
        color: #a60021;
        background: #ffe5ea;
        border: 1px solid #f4b8c5;
        padding: 8px;
        border-radius: 6px;
      }
      .lab {
        margin-top: 18px;
        color: #735600;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>StaffHub Portal</h1>
      <p class="note">Northbridge Retail Group Internal Access</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
        <button type="submit">Sign In</button>
      </form>
      <p class="lab">Lab-only training environment. Do not use outside CyberForge scenarios.</p>
    </div>
  </body>
</html>
